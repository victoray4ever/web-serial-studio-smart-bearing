<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MEMS-CMS - MEMS Condition Monitoring System." />
  <meta name="theme-color" content="#060a13" />
  <title>MEMS-CMS</title>

  <!-- Chart.js CDN and Plugins -->
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  
  <!-- MQTT.js -->
  <script defer src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="src/styles/index.css" />
  <link rel="stylesheet" href="src/styles/toolbar.css?v=mems-cms-brand-20260525-2" />
  <link rel="stylesheet" href="src/styles/sidebar.css" />
  <link rel="stylesheet" href="src/styles/dashboard.css" />
  <link rel="stylesheet" href="src/styles/console.css" />
  <link rel="stylesheet" href="src/styles/widgets.css" />
  <link rel="stylesheet" href="src/styles/editor.css?v=field-index-20260515-1" />

  <style>
    /* Quick fixes and overrides */
    #toolbar-root { flex-shrink: 0; }
    #taskbar-root { flex-shrink: 0; }
    #sidebar-root { display: flex; }
    #content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    #dashboard-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
    }
    #console-area {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* Sidebar collapse */
    .sidebar.collapsed {
      margin-left: calc(-1 * var(--sidebar-width));
      opacity: 0;
      pointer-events: none;
    }

    /* Fullscreen fix */
    :fullscreen .toolbar,
    :fullscreen .taskbar { display: none; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="src/main.js?v=mems-cms-brand-20260525-2"></script>
</body>
</html>
